name: open_plant
description: 🌱 Open-Source & Privacy-Friendly Companion App for your Plants
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  get_it: ^8.0.3
  image: ^4.5.3
  image_picker: ^1.2.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  flutter_onnxruntime: ^1.8.0
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/ml/plant-identification/
